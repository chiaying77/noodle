<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>麵攤點餐助手</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');

  :root {
    --bg: #1a0a00;
    --surface: #2d1500;
    --card: #3d1f00;
    --accent: #ff8c00;
    --accent2: #ffb347;
    --text: #fff8f0;
    --text-dim: #c8a882;
    --green: #4caf50;
    --red: #ff5252;
    --blue: #5bc8e8;
    --purple: #b88cf8;
    --border: rgba(255,140,0,0.25);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    font-family: 'Noto Sans TC', sans-serif;
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    background-image: radial-gradient(ellipse at 20% 10%, rgba(255,140,0,0.06) 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 80%, rgba(255,100,0,0.04) 0%, transparent 50%);
  }

  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(26,10,0,0.96);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
  }
  .header-title { font-size: 20px; font-weight: 900; color: var(--accent); letter-spacing: 2px; flex-shrink: 0; }
  .order-count { font-size: 13px; color: var(--text-dim); background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; flex-shrink: 0; }
  .order-count span { color: var(--accent2); font-weight: 700; font-size: 17px; }
  .header-btns { display: flex; gap: 8px; }
  .hbtn {
    border-radius: 8px; padding: 6px 12px; font-size: 13px; font-family: inherit; cursor: pointer; transition: all 0.2s; border: 1px solid; font-weight: 700;
  }
  .hbtn-red   { background: rgba(255,82,82,0.12);  border-color: rgba(255,82,82,0.4);  color: var(--red); }
  .hbtn-purple{ background: rgba(184,140,248,0.12); border-color: rgba(184,140,248,0.4); color: var(--purple); }
  .hbtn:active { transform: scale(0.95); }

  /* Merge mode banner */
  .merge-banner {
    display: none;
    background: rgba(184,140,248,0.15);
    border-bottom: 1px solid rgba(184,140,248,0.35);
    padding: 10px 16px;
    font-size: 14px;
    color: var(--purple);
    text-align: center;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .merge-banner.show { display: block; }
  .merge-confirm-row {
    display: none;
    gap: 10px;
    padding: 0 14px 12px;
  }
  .merge-confirm-row.show { display: flex; }
  .mbtn {
    flex: 1; border-radius: 10px; padding: 11px; font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer; border: 1px solid; transition: all .15s;
  }
  .mbtn-cancel { background: var(--surface); border-color: var(--border); color: var(--text-dim); }
  .mbtn-merge  { background: rgba(184,140,248,0.18); border-color: rgba(184,140,248,0.5); color: var(--purple); }
  .mbtn:active { transform: scale(0.96); }

  /* Mic section */
  .mic-section {
    display: flex; flex-direction: column; align-items: center;
    padding: 22px 20px 16px; gap: 12px; position: relative; z-index: 1;
  }
  .mic-btn {
    width: 110px; height: 110px;
    border-radius: 50%; border: 3px solid var(--accent);
    background: var(--surface); color: var(--accent); font-size: 44px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; box-shadow: 0 0 0 0 rgba(255,140,0,0.4);
    -webkit-user-select: none; user-select: none;
  }
  .mic-btn.listening {
    border-color: var(--red); color: var(--red); background: rgba(255,82,82,0.08);
    animation: pulse-ring 1.2s ease-out infinite;
  }
  .mic-btn:active { transform: scale(0.94); }
  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 rgba(255,82,82,0.5); }
    70%  { box-shadow: 0 0 0 26px rgba(255,82,82,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,82,82,0); }
  }
  .mic-label { font-size: 14px; color: var(--text-dim); letter-spacing: 1px; }
  .mic-label.active { color: var(--red); font-weight: 700; }
  .hotword-hint { font-size: 12px; color: rgba(200,168,130,0.55); text-align: center; line-height: 1.7; }
  .hotword-hint b { color: var(--accent2); }

  /* Silence slider */
  .silence-row {
    width: 100%; max-width: 320px;
    display: flex; align-items: center; gap: 10px;
    padding: 0 4px;
  }
  .silence-lbl { font-size: 12px; color: var(--text-dim); white-space: nowrap; }
  .silence-slider {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 4px; border-radius: 4px;
    background: var(--surface); outline: none; cursor: pointer;
    accent-color: var(--accent);
  }
  .silence-val { font-size: 13px; color: var(--accent2); font-weight: 700; min-width: 28px; text-align: right; }

  /* Transcript */
  .transcript-box {
    margin: 0 14px 14px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 16px; min-height: 50px;
    display: flex; align-items: center; gap: 10px; position: relative; z-index: 1;
  }
  .transcript-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--text-dim); flex-shrink: 0; transition: background 0.2s; }
  .transcript-dot.active { background: var(--red); animation: blink 0.8s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
  .transcript-text { font-size: 15px; color: var(--text-dim); flex: 1; }
  .transcript-text.live { color: var(--text); }

  /* Cards */
  .cards-section { padding: 0 12px 110px; position: relative; z-index: 1; }
  .section-lbl { font-size: 11px; letter-spacing: 3px; color: var(--text-dim); opacity: .65; padding: 0 4px 10px; }
  .cards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; }
  @media (min-width:600px) { .cards-grid { grid-template-columns: repeat(3,1fr); } }

  .order-card {
    background: var(--card); border: 1.5px solid var(--border);
    border-radius: 16px; padding: 14px 14px 46px;
    position: relative; overflow: hidden;
    animation: card-in .35s cubic-bezier(.34,1.56,.64,1) both;
    transition: border-color .2s, opacity .3s, transform .15s;
    cursor: default;
  }
  .order-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 16px 16px 0 0;
  }
  .order-card.done { opacity: .3; border-color: rgba(255,140,0,0.08); }
  .order-card.done::before { background: #444; }

  /* Merge select state */
  .order-card.merge-selected {
    border-color: var(--purple) !important;
    box-shadow: 0 0 0 2px rgba(184,140,248,0.35);
  }
  .order-card.merge-selected::before { background: linear-gradient(90deg, var(--purple), #d4b0ff); }
  .merge-tick {
    display: none; position: absolute; top: 10px; right: 10px;
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--purple); color: #fff; font-size: 13px;
    align-items: center; justify-content: center; font-weight: 900;
  }
  .order-card.merge-selected .merge-tick { display: flex; }

  @keyframes card-in {
    from { opacity:0; transform: translateY(18px) scale(.92); }
    to   { opacity:1; transform: none; }
  }

  .card-num  { font-size: 10px; color: var(--accent); font-weight: 700; letter-spacing: 2px; margin-bottom: 4px; }
  .card-id   { font-size: 19px; font-weight: 900; color: var(--accent2); margin-bottom: 7px; line-height: 1.2; }
  .card-items{ font-size: 16px; font-weight: 700; color: var(--text); line-height: 1.55; }
  .card-time { font-size: 10px; color: var(--text-dim); opacity: .6; margin-top: 6px; }

  .card-actions { position: absolute; bottom: 0; left: 0; right: 0; display: flex; }
  .order-card.done .card-actions { display: none; }
  .ca-btn {
    flex: 1; border: none; padding: 9px 4px; font-size: 12px;
    font-family: inherit; font-weight: 700; cursor: pointer; transition: all .15s;
  }
  .ca-done {
    background: rgba(76,175,80,0.12); color: var(--green);
    border-top: 1px solid rgba(76,175,80,0.25); border-right: .5px solid rgba(255,255,255,0.05);
    border-radius: 0 0 0 16px;
  }
  .ca-merge {
    background: rgba(184,140,248,0.1); color: var(--purple);
    border-top: 1px solid rgba(184,140,248,0.2); border-left: .5px solid rgba(255,255,255,0.05);
    border-radius: 0 0 16px 0;
  }
  .ca-btn:active { filter: brightness(1.4); }

  .done-badge {
    display: none; position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%) rotate(-12deg);
    font-size: 28px; font-weight: 900; color: rgba(76,175,80,0.6);
    border: 2.5px solid rgba(76,175,80,0.4); border-radius: 8px;
    padding: 2px 10px; letter-spacing: 4px; pointer-events: none;
  }
  .order-card.done .done-badge { display: block; }

  .empty { grid-column: 1/-1; text-align: center; padding: 50px 20px; color: var(--text-dim); opacity: .45; }
  .empty .ico { font-size: 52px; margin-bottom: 12px; }

  /* Bottom bar */
  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    padding: 10px 14px 20px;
    background: linear-gradient(transparent, rgba(26,10,0,0.98) 40%);
    display: flex; gap: 10px;
  }
  .clear-btn {
    flex: 1; background: rgba(255,82,82,0.1); border: 1px solid rgba(255,82,82,0.35);
    color: var(--red); border-radius: 12px; padding: 12px;
    font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer;
  }
  .clear-btn:active { background: rgba(255,82,82,0.25); }

  /* Correction toast */
  .correction-toast {
    position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
    background: rgba(30,15,0,0.95); border: 1px solid var(--accent);
    border-radius: 10px; padding: 8px 16px; font-size: 13px; color: var(--accent2);
    z-index: 300; display: none; white-space: nowrap; max-width: 90vw;
    text-overflow: ellipsis; overflow: hidden;
  }

  .confirm-btn {
    background: var(--accent);
    border: none;
    border-radius: 10px;
    padding: 8px 16px;
    font-size: 15px;
    font-weight: 900;
    font-family: inherit;
    color: #1a0a00;
    cursor: pointer;
    flex-shrink: 0;
    transition: all .15s;
    white-space: nowrap;
  }
  .confirm-btn:active { transform: scale(0.93); }

  .card-del {
    position: absolute;
    top: 8px; right: 8px;
    width: 26px; height: 26px;
    border-radius: 50%;
    background: rgba(255,82,82,0.15);
    border: 1px solid rgba(255,82,82,0.35);
    color: var(--red);
    font-size: 14px;
    font-weight: 900;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    line-height: 1;
    transition: all .15s;
    z-index: 10;
  }
  .card-del:active { background: rgba(255,82,82,0.4); transform: scale(0.9); }
  .order-card.done .card-del { display: none; }

  .card-wait {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    margin-top: 6px;
    padding: 2px 8px;
    border-radius: 20px;
    background: rgba(255,140,0,0.12);
    color: var(--accent2);
    border: 1px solid rgba(255,140,0,0.2);
  }
  .card-wait.urgent {
    background: rgba(255,82,82,0.15);
    color: var(--red);
    border-color: rgba(255,82,82,0.35);
    animation: urgentPulse 1.5s ease-in-out infinite;
  }
  @keyframes urgentPulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  /* ── 點餐模式切換 ── */
  .mode-tabs {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .mode-tab {
    flex: 1; padding: 12px 6px; text-align: center;
    font-size: 14px; font-weight: 700; color: var(--text-dim);
    cursor: pointer; border-bottom: 3px solid transparent;
    transition: all .2s; letter-spacing: 1px;
  }
  .mode-tab.active { color: var(--accent2); border-color: var(--accent); }

  /* ── 手動點餐面板 ── */
  .order-panel { display: none; padding: 16px 14px 120px; }
  .order-panel.active { display: block; }
  .voice-panel { display: block; }
  .voice-panel.hidden { display: none; }

  .op-section { margin-bottom: 18px; }
  .op-label {
    font-size: 11px; letter-spacing: 3px; color: var(--text-dim);
    opacity: .7; margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
  }
  .op-label span {
    background: var(--accent); color: #1a0a00;
    border-radius: 50%; width: 18px; height: 18px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 900; flex-shrink: 0;
  }

  .op-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .op-grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .op-grid-5 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

  .op-btn {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 14px 8px;
    font-size: 15px; font-weight: 700;
    font-family: inherit; color: var(--text);
    cursor: pointer; text-align: center;
    transition: all .15s; line-height: 1.3;
    min-height: 60px; display: flex; align-items: center; justify-content: center;
  }
  .op-btn:active { transform: scale(0.95); }
  .op-btn.selected {
    border-color: var(--accent);
    background: rgba(255,140,0,0.18);
    color: var(--accent2);
  }
  .op-btn.cat-btn { font-size: 16px; }
  .op-btn.size-btn { font-size: 18px; font-weight: 900; }
  .op-btn.disabled { opacity: .3; pointer-events: none; }

  /* extras row */
  .extras-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
  .extra-btn {
    background: var(--card); border: 1.5px solid var(--border);
    border-radius: 20px; padding: 7px 14px;
    font-size: 13px; font-weight: 700; font-family: inherit; color: var(--text-dim);
    cursor: pointer; transition: all .15s;
  }
  .extra-btn.selected {
    border-color: var(--purple); color: var(--purple);
    background: rgba(184,140,248,0.12);
  }
  .extra-btn:active { transform: scale(0.95); }

  /* customer id input */
  .customer-row { display: flex; gap: 10px; margin-bottom: 18px; align-items: center; }
  .customer-inp {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 14px; font-size: 16px;
    color: var(--text); font-family: inherit; outline: none;
  }
  .customer-inp:focus { border-color: var(--accent); }
  .customer-lbl { font-size: 13px; color: var(--text-dim); white-space: nowrap; }

  /* order summary bar */
  .order-summary {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 14px 16px; margin-bottom: 16px;
    min-height: 52px; display: flex; align-items: center; gap: 10px;
  }
  .summary-text { flex: 1; font-size: 16px; font-weight: 700; color: var(--text-dim); }
  .summary-text.ready { color: var(--accent2); }

  /* submit button */
  .op-submit {
    width: 100%; background: var(--accent); border: none;
    border-radius: 14px; padding: 16px; font-size: 20px; font-weight: 900;
    font-family: inherit; color: #1a0a00; cursor: pointer;
    transition: all .15s; margin-bottom: 10px;
  }
  .op-submit:active { transform: scale(0.97); }
  .op-submit.disabled { opacity: .4; pointer-events: none; }
  .op-reset {
    width: 100%; background: transparent; border: 1px solid var(--border);
    border-radius: 12px; padding: 10px; font-size: 14px; font-weight: 700;
    font-family: inherit; color: var(--text-dim); cursor: pointer;
  }

  /* category header colors */
  .cat-羹 .op-btn.selected { border-color: #ff8c00; background: rgba(255,140,0,0.15); color: var(--accent2); }
  .cat-清 .op-btn.selected { border-color: #5bc8e8; background: rgba(91,200,232,0.12); color: #5bc8e8; }
  .cat-乾 .op-btn.selected { border-color: #4caf50; background: rgba(76,175,80,0.12); color: #4caf50; }
  .cat-湯 .op-btn.selected { border-color: var(--purple); background: rgba(184,140,248,0.12); color: var(--purple); }

  /* ── 數量選擇器 ── */
  .qty-section { margin-bottom: 18px; }
  .qty-row {
    display: flex; align-items: center; gap: 0;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; overflow: hidden; height: 56px;
  }
  .qty-btn {
    width: 64px; height: 100%; border: none;
    background: var(--card); color: var(--accent2);
    font-size: 26px; font-weight: 900; font-family: inherit;
    cursor: pointer; transition: all .15s; flex-shrink: 0;
  }
  .qty-btn:active { background: rgba(255,140,0,0.25); }
  .qty-num {
    flex: 1; text-align: center; font-size: 28px; font-weight: 900;
    color: var(--accent2); line-height: 56px;
  }

  /* ── 購物車清單 ── */
  .cart-section { margin-bottom: 18px; }
  .cart-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
  .cart-item {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 10px 14px;
  }
  .cart-item-text { flex: 1; font-size: 15px; font-weight: 700; color: var(--text); }
  .cart-item-del {
    width: 28px; height: 28px; border-radius: 50%;
    background: rgba(255,82,82,0.12); border: 1px solid rgba(255,82,82,0.3);
    color: var(--red); font-size: 14px; font-weight: 900;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .cart-empty { font-size: 13px; color: var(--text-dim); opacity: .5; padding: 4px 2px; }

  .add-to-cart-btn {
    width: 100%; background: rgba(255,140,0,0.15);
    border: 2px solid var(--accent); border-radius: 14px;
    padding: 14px; font-size: 18px; font-weight: 900;
    font-family: inherit; color: var(--accent2); cursor: pointer;
    transition: all .15s; margin-bottom: 10px;
  }
  .add-to-cart-btn:active { transform: scale(0.97); background: rgba(255,140,0,0.28); }
  .add-to-cart-btn.disabled { opacity: .35; pointer-events: none; }

  /* ══ 新手動點餐介面 ══ */
  .mp-wrap { padding: 14px 14px 130px; }



  .mp-section-title {
    font-size: 15px; font-weight: 900; letter-spacing: 2px;
    margin: 16px 0 10px; padding-left: 2px;
  }

  /* 主餐大格按鈕 */
  .mp-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 4px;
  }
  .mp-item-btn {
    border-radius: 16px; border: 2.5px solid transparent;
    padding: 0; cursor: pointer; font-family: inherit;
    transition: all .15s; overflow: hidden;
    display: flex; flex-direction: column;
    min-height: 90px; position: relative;
  }
  .mp-item-btn:active { transform: scale(0.96); }
  .mp-item-main {
    flex: 1; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 2px; padding: 10px 8px;
  }
  .mp-item-name { font-size: 20px; font-weight: 900; }
  .mp-item-sub  { font-size: 12px; opacity: .7; }

  /* 麵種選擇器（inline，橫排小按鈕） */
  .mp-noodle-row {
    display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px;
  }
  .mp-noodle-btn {
    padding: 10px 18px; border-radius: 20px;
    border: 2px solid var(--border); background: var(--card);
    font-size: 17px; font-weight: 700; font-family: inherit;
    color: var(--text-dim); cursor: pointer; transition: all .15s;
  }
  .mp-noodle-btn.sel {
    border-color: var(--accent); color: var(--accent2);
    background: rgba(255,140,0,0.15);
  }
  .mp-noodle-btn:active { transform: scale(0.95); }

  /* 大小選擇（inline） */
  .mp-size-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .mp-size-btn {
    flex: 1; padding: 16px; border-radius: 12px;
    border: 2.5px solid var(--border); background: var(--card);
    font-size: 22px; font-weight: 900; font-family: inherit;
    color: var(--text-dim); cursor: pointer; transition: all .15s;
  }
  .mp-size-btn.sel {
    border-color: var(--accent); color: var(--accent2);
    background: rgba(255,140,0,0.15);
  }

  /* 加料 */
  .mp-extras { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
  .mp-extra-btn {
    padding: 10px 18px; border-radius: 20px;
    border: 1.5px solid var(--border); background: var(--card);
    font-size: 17px; font-weight: 700; font-family: inherit;
    color: var(--text-dim); cursor: pointer; transition: all .15s;
  }
  .mp-extra-btn.sel {
    border-color: var(--purple); color: var(--purple);

<div class="correction-toast" id="corrToast"></div>

<script>
// ────────────────────────────────────────────
// 音效
// ────────────────────────────────────────────
function beep(freq, dur, vol=0.35) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + dur);
  } catch(e) {}
}
function newOrderChime() {
  beep(660, 0.15);
}
function doneChime() {
  beep(880, 0.1);
  setTimeout(() => beep(1100, 0.18), 120);
}

// ────────────────────────────────────────────
// 詞彙修正對照表（錯誤辨識 → 正確）
// ────────────────────────────────────────────
const CORRECTIONS = {
  // 食物
  '肉更': '肉羹', '肉耕': '肉羹', '肉梗': '肉羹', '肉根': '肉羹',
  '米粉': '米粉', '意麵': '意麵',
  '碗刀': '碗豆', '腸旺': '腸旺',
  '幹麵': '乾麵', '乾面': '乾麵', '干麵': '乾麵',
  '唐': '湯', '燙': '湯',
  '肉丸': '肉圓',

  // 尺寸
  '大完': '大碗', '大腕': '大碗', '打碗': '大碗',
  '小完': '小碗', '小腕': '小碗',
  '中完': '中碗', '中腕': '中碗',

  // 麵條
  '粗德': '粗的', '細德': '細的',
  '寬面': '寬麵', '扁面': '扁麵', '扁免': '扁麵',
  '意面': '意麵',

  // 數量
  '一碗': '一碗', '兩碗': '兩碗', '两碗': '兩碗',
  '三碗': '三碗', '四碗': '四碗',
  '一份': '一份', '兩份': '兩份',

  // 指示語誤辨
  '下蛋': '下單', '下彈': '下單', '夏單': '下單',
};

function applyCorrections(text) {
  let result = text;
  let corrected = [];
  for (const [wrong, right] of Object.entries(CORRECTIONS)) {
    if (result.includes(wrong) && wrong !== right) {
      result = result.replaceAll(wrong, right);
      corrected.push(`「${wrong}」→「${right}」`);
    }
  }
  if (corrected.length > 0) showCorrectionToast(corrected.join('　'));
  return result;
}

function showCorrectionToast(msg) {
  const el = document.getElementById('corrToast');
  el.textContent = '✦ 自動修正：' + msg;
  el.style.display = 'block';
  clearTimeout(el._t);
  el._t = setTimeout(() => el.style.display = 'none', 3000);
}

// ────────────────────────────────────────────
// 儲存 / 載入（localStorage + 隔天自動清空）
// ────────────────────────────────────────────
const STORAGE_KEY = 'noodle_orders_v1';

function todayStr() {
  return new Date().toLocaleDateString('zh-TW');
}

function saveOrders() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      date: todayStr(),
      orders,
      orderSeq
    }));
  } catch(e) {}
}

function loadOrders() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    // 隔天自動清空
    if (data.date !== todayStr()) {
      localStorage.removeItem(STORAGE_KEY);
      return;
    }
    orders = data.orders || [];
    orderSeq = data.orderSeq || 0;
  } catch(e) {}
}

// ────────────────────────────────────────────
// Orders
// ────────────────────────────────────────────
let orders = [];
let orderSeq = 0;

function addOrder(who, what) {
  orderSeq++;
  orders.unshift({ id: orderSeq, who, what, time: now(), timestamp: Date.now(), done: false });
  saveOrders();
  renderCards();
  flashMic();
  newOrderChime();
}

function markDone(id) {
  const o = orders.find(o => o.id === id);
  if (o) { const wasDone = o.done; o.done = !o.done; if (!wasDone) doneChime(); saveOrders(); renderCards(); }
}

function clearDone() {
  orders = orders.filter(o => !o.done);
  saveOrders();
  renderCards();
}

function now() {
  return new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
}

// ────────────────────────────────────────────
// Merge
// ────────────────────────────────────────────
let mergeMode = false;
let mergeSelected = []; // array of order ids

function toggleMergeMode() {
  mergeMode = !mergeMode;
  mergeSelected = [];
  document.getElementById('mergeBanner').classList.toggle('show', mergeMode);
  document.getElementById('mergeConfirmRow').classList.toggle('show', mergeMode);
  document.getElementById('mergeModeBtn').textContent = mergeMode ? '取消合併' : '合併';
  document.getElementById('mergeModeBtn').style.background = mergeMode ? 'rgba(184,140,248,0.25)' : '';
  renderCards();
}

function cancelMerge() {
  mergeMode = false;
  mergeSelected = [];
  document.getElementById('mergeBanner').classList.remove('show');
  document.getElementById('mergeConfirmRow').classList.remove('show');
  document.getElementById('mergeModeBtn').textContent = '合併';
  document.getElementById('mergeModeBtn').style.background = '';
  renderCards();
}

function toggleMergeSelect(id) {
  if (!mergeMode) return;
  const o = orders.find(o => o.id === id);
  if (!o || o.done) return;

  const idx = mergeSelected.indexOf(id);
  if (idx >= 0) {
    mergeSelected.splice(idx, 1);
  } else {
    if (mergeSelected.length >= 2) return; // max 2
    mergeSelected.push(id);
  }
  document.getElementById('mergeDoBtn').disabled = mergeSelected.length < 2;
  renderCards();
}

function doMerge() {
  if (mergeSelected.length < 2) return;
  const [id1, id2] = mergeSelected;
  const o1 = orders.find(o => o.id === id1);
  const o2 = orders.find(o => o.id === id2);
  if (!o1 || !o2) return;

  // Merge: combine who (if different) and what
  const mergedWho = o1.who === o2.who ? o1.who : `${o1.who} / ${o2.who}`;
  const mergedWhat = `${o1.what}　${o2.what}`;

  // Remove o2, update o1
  orders = orders.filter(o => o.id !== id2);
  o1.who = mergedWho;
  o1.what = mergedWhat;

  saveOrders();
  cancelMerge();
  renderCards();
}

// ────────────────────────────────────────────
// 等待時間
// ────────────────────────────────────────────
function getWaitMins(timestamp) {
  return Math.floor((Date.now() - timestamp) / 60000);
}
function getWaitLabel(timestamp) {
  const m = getWaitMins(timestamp);
  if (m < 1) return '剛點的';
  return `等待 ${m} 分鐘`;
}
function getWaitClass(timestamp) {
  const m = getWaitMins(timestamp);
  return m >= 10 ? 'urgent' : '';
}
// 每分鐘更新等待時間
setInterval(() => {
  orders.forEach(o => {
    if (o.done || !o.timestamp) return;
    const el = document.getElementById('wait-' + o.id);
    if (el) {
      el.textContent = getWaitLabel(o.timestamp);
      el.className = 'card-wait ' + getWaitClass(o.timestamp);
    }
  });
}, 30000); // 每30秒更新一次

// ────────────────────────────────────────────
// Render
// ────────────────────────────────────────────
function renderCards() {
  const grid = document.getElementById('cardsGrid');
  const pending = orders.filter(o => !o.done).length;
  document.getElementById('pendingCount').textContent = pending;

  if (orders.length === 0) {
    grid.innerHTML = `<div class="empty"><div class="ico">📋</div><p>還沒有訂單<br>按麥克風說「下單」開始</p></div>`;
    return;
  }

  grid.innerHTML = orders.map(o => {
    const sel = mergeSelected.includes(o.id);
    const mergeClass = sel ? 'merge-selected' : '';
    const cardClick = mergeMode && !o.done ? `onclick="toggleMergeSelect(${o.id})"` : '';
    const cursorStyle = mergeMode && !o.done ? 'style="cursor:pointer"' : '';
    return `
      <div class="order-card ${o.done ? 'done' : ''} ${mergeClass}" ${cardClick} ${cursorStyle}>
        <div class="merge-tick">✓</div>
        ${!o.done ? `<button class="card-del" onclick="event.stopPropagation(); deleteOrder(${o.id})">✕</button>` : ''}
        <div class="card-num">NO.${String(o.id).padStart(3,'0')}</div>
        <div class="card-id">${esc(o.who)}</div>
        <div class="card-items">${esc(o.what)}</div>
        <div class="card-time">${o.time}</div>
        ${!o.done ? `<div class="card-wait ${getWaitClass(o.timestamp)}" id="wait-${o.id}">${getWaitLabel(o.timestamp)}</div>` : ''}
        ${!o.done && !mergeMode ? `
        <div class="card-actions">
          <button class="ca-btn ca-done" onclick="markDone(${o.id})">✓ 完成</button>
          <button class="ca-btn ca-merge" onclick="startMergeFrom(${o.id})">⊕ 合併</button>
        </div>` : ''}
        <div class="done-badge">完成</div>
      </div>
    `;
  }).join('');
}

// Shortcut: click merge button on a specific card → enter merge mode with that card pre-selected
function startMergeFrom(id) {
  if (!mergeMode) {
    mergeMode = true;
    mergeSelected = [id];
    document.getElementById('mergeBanner').classList.add('show');
    document.getElementById('mergeConfirmRow').classList.add('show');
    document.getElementById('mergeModeBtn').textContent = '取消合併';
    document.getElementById('mergeModeBtn').style.background = 'rgba(184,140,248,0.25)';
    document.getElementById('mergeDoBtn').disabled = true;
    renderCards();
  }
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ────────────────────────────────────────────
// Silence slider
// ────────────────────────────────────────────
let SILENCE_MS = 2500;
function updateSilence(v) {
  SILENCE_MS = parseFloat(v) * 1000;
  document.getElementById('silenceVal').textContent = parseFloat(v).toFixed(1) + '秒';
}

// ────────────────────────────────────────────
// Speech Recognition
// ────────────────────────────────────────────
let recognition = null;
let isListening = false;
let isCapturing = false;
let captureBuffer = '';
let captureTimer = null;
let alwaysOn = false;
let orderJustPlaced = false; // 防止重複開卡
let lastResultText = '';   // 防止 iOS 重複回傳
const HOTWORD = '下單';

function initSR() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return null;
  const r = new SR();
  r.continuous = true;
  r.interimResults = true;
  r.lang = 'zh-TW';
  r.maxAlternatives = 1;

  r.onstart = () => { isListening = true; updateMicUI(); };
  r.onend = () => {
    isListening = false; isCapturing = false;
    updateMicUI();
    if (alwaysOn) setTimeout(() => { try { r.start(); } catch(e){} }, 350);
  };
  r.onerror = (e) => {
    isListening = false; isCapturing = false; updateMicUI();
    if (e.error === 'not-allowed') { alwaysOn = false; alert('請允許麥克風權限！'); return; }
    if (alwaysOn) setTimeout(() => { try { r.start(); } catch(e){} }, 500);
  };
  r.onresult = (event) => {
    let interim = '', final = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const t = event.results[i][0].transcript;
      if (event.results[i].isFinal) final += t;
      else interim += t;
    }
    const raw = (final || interim).trim();
    if (!raw) return;

    // 如果已經送出過（orderJustPlaced），忽略所有殘留結果
    if (orderJustPlaced) return;

    const text = applyCorrections(raw);

    if (!isCapturing) {
      if (text.includes(HOTWORD)) {
        isCapturing = true;
        lastResultText = ''; // 清空上一次結果，避免重複
        captureBuffer = text.slice(text.indexOf(HOTWORD) + HOTWORD.length).trim();
        setTranscript(captureBuffer || '請說餐點內容…', true);
        if (captureBuffer.length > 1) resetCapTimer();
      }
      // 沒有下單指令完全忽略
    } else {
      const newBuffer = text.replace(new RegExp(HOTWORD,'g'), '').trim();
      // 避免 iOS 重複回傳完全一樣的結果
      if (newBuffer === lastResultText) return;
      lastResultText = newBuffer;
      if (newBuffer.length >= captureBuffer.length) {
        captureBuffer = newBuffer;
      }
      setTranscript(captureBuffer, true);
      if (captureBuffer.length > 1) resetCapTimer();
    }
  };
  return r;
}

function deleteOrder(id) {
  orders = orders.filter(o => o.id !== id);
  saveOrders();
  renderCards();
}

function manualConfirm() {
  if (captureBuffer.length > 1 && !orderJustPlaced) {
    clearTimeout(captureTimer);
    orderJustPlaced = true;
    confirmOrder(captureBuffer);
    captureBuffer = '';
    lastResultText = '';
    isCapturing = false;
    setTranscript('等待收音中…', false);
    setTimeout(() => { orderJustPlaced = false; }, 1500);
  }
}

function resetCapTimer() {
  clearTimeout(captureTimer);
  if (captureBuffer.length > 1) {
    captureTimer = setTimeout(() => {
      if (orderJustPlaced) return; // 已送出，不重複
      orderJustPlaced = true;
      confirmOrder(captureBuffer);
      captureBuffer = '';
      lastResultText = '';
      isCapturing = false;
      setTranscript('等待收音中…', false);
      // 1.5秒後才允許下一筆，讓 iOS 把殘留結果吐完
      setTimeout(() => { orderJustPlaced = false; }, 1500);
    }, SILENCE_MS);
  }
}

function confirmOrder(text) {
  const parts = text.split(/[，,、。]/);
  let who = '語音點餐', what = text;
  if (parts.length >= 2) { who = parts[0].trim(); what = parts.slice(1).join('、').trim(); }
  addOrder(who, what);
}

function toggleListen() {
  if (!recognition) {
    recognition = initSR();
    if (!recognition) { alert('此瀏覽器不支援語音辨識，請改用 Chrome。'); return; }
  }
  if (isListening) {
    alwaysOn = false;
    try { recognition.stop(); } catch(e){}
  } else {
    alwaysOn = true;
    try { recognition.start(); } catch(e){
      try { recognition.stop(); } catch(e2){}
      setTimeout(() => { try { recognition.start(); } catch(e3){} }, 400);
    }
  }
}

function setTranscript(t, active) {
  document.getElementById('tText').textContent = t || '等待收音中…';
  document.getElementById('tText').className = 'transcript-text' + (active ? ' live' : '');
  document.getElementById('tDot').className = 'transcript-dot' + (active ? ' active' : '');
  // 顯示送出按鈕：只要在收單模式且有內容
  const showBtn = isCapturing && captureBuffer && captureBuffer.length > 1;
  document.getElementById('confirmBtn').style.display = showBtn ? 'inline-block' : 'none';
}
function updateMicUI() {
  const btn = document.getElementById('micBtn');
  const lbl = document.getElementById('micLabel');
  if (isListening) {
    btn.classList.add('listening'); btn.textContent = '⏹';
    lbl.textContent = isCapturing ? '🔴 記錄餐點中…' : '🟢 收音中，說「下單」…';
    lbl.className = 'mic-label active';
  } else {
    btn.classList.remove('listening'); btn.textContent = '🎤';
    lbl.textContent = '點擊開始收音';
    lbl.className = 'mic-label';
    setTranscript('等待收音中…', false);
    document.getElementById('confirmBtn').style.display = 'none';
  }
}
function flashMic() {
  const btn = document.getElementById('micBtn');
  btn.style.backgroundColor = 'rgba(255,140,0,0.18)';
  setTimeout(() => btn.style.backgroundColor = '', 250);
}

// ────────────────────────────────────────────
// 點餐模式切換
// ────────────────────────────────────────────
function switchMode(mode) {
  document.getElementById('tab-voice').classList.toggle('active', mode === 'voice');
  document.getElementById('tab-manual').classList.toggle('active', mode === 'manual');
  document.getElementById('voicePanel').classList.toggle('hidden', mode === 'manual');
  document.getElementById('voicePanel').style.display = mode === 'voice' ? 'block' : 'none';
  document.getElementById('manualPanel').classList.toggle('active', mode === 'manual');
}

// ────────────────────────────────────────────
// 手動點餐邏輯
// ────────────────────────────────────────────
const MENU = {
  羹類: {
    items: ['肉羹', '魚酥羹', '花枝羹'],
    hasNoodle: true, hasSize: true,
    color: '#ff8c00'
  },
  菜頭清湯: {
    items: ['肉羹清湯', '花枝清湯'],
    hasNoodle: true, hasSize: true,
    color: '#5bc8e8'
  },
  乾麵: {
    items: ['大乾麵', '小乾麵'],
    hasNoodle: true, hasSize: false,
    color: '#4caf50'
  },
  '湯品小菜': {
    items: ['滷蛋', '貢丸湯', '肉羹湯', '魚酥羹湯', '花枝羹湯'],
    hasNoodle: false, hasSize: false,
    color: '#b88cf8',
    note: '不含麵'
  }
};

const GENG_ITEMS   = ['肉羹','魚酥羹','花枝羹','魷魚羹'];
const QING_ITEMS   = ['肉羹清湯','花枝清湯','魷魚清湯','魚酥清湯'];
const DRY_ITEMS    = ['大乾麵','小乾麵'];
const SINGLE_ITEMS = ['滷蛋','貢丸湯','菜頭湯'];
const NOODLES      = ['粗陽春','細陽春','冬粉','油麵','米粉','不要麵'];
const SIZES        = ['大碗','小碗'];
const EXTRAS       = ['加貢丸','加滷蛋','加辣','不要蔥','不要香菜','不要油蔥','不要醬油'];
const HAS_NOODLE   = new Set([...GENG_ITEMS,...QING_ITEMS,...DRY_ITEMS]);
const HAS_SIZE     = new Set([...GENG_ITEMS,...QING_ITEMS]);

let opState   = { item:null, noodle:null, size:null, extras:[], qty:1, dineIn:null };
let cartItems = [];

// ── 內用外帶 ──
function selectDine(type) {
  opState.dineIn = type;
  document.getElementById('dineIn').className  = 'mp-dine-btn' + (type==='內用' ? ' sel-dine' : '');
  document.getElementById('dineOut').className = 'mp-dine-btn' + (type==='外帶' ? ' sel-take' : '');
}

// ── 建立餐點格子 ──
function buildItemGrid(gridId, items, catClass) {
  document.getElementById(gridId).innerHTML = items.map(item => `
    <button class="mp-item-btn ${catClass}" onclick="mpSelectItem('${item}')" id="mpitem-${item}">
      <div class="mp-item-main">
        <div class="mp-item-name">${item}</div>
      </div>
    </button>
  `).join('');
}

// ── 建立加料 ──
function buildExtras() {
  document.getElementById('mpExtras').innerHTML = EXTRAS.map(e =>
    `<button class="mp-extra-btn" onclick="mpToggleExtra('${e}')" id="mpex-${e}">${e}</button>`
  ).join('');
}

// ── 初始化手動點餐介面 ──
function initManualPanel() {
  buildItemGrid('mpGengGrid',   GENG_ITEMS,   'cat-geng');
  buildItemGrid('mpQingGrid',   QING_ITEMS,   'cat-qing');
  buildItemGrid('mpDryGrid',    DRY_ITEMS,    'cat-dry');
  buildItemGrid('mpSingleGrid', SINGLE_ITEMS, 'cat-single');
  buildExtras();
}

// ── 選餐點 ──
function mpSelectItem(item) {
  document.querySelectorAll('.mp-item-btn').forEach(b => b.classList.remove('sel'));
  document.getElementById('mpitem-' + item).classList.add('sel');

  opState.item   = item;
  opState.noodle = null;
  opState.size   = null;

  const panel = document.getElementById('mpSharedSubPanel');
  let html = '';

  if (HAS_NOODLE.has(item)) {
    html += '<div class="mp-sub-label">麵種</div><div class="mp-noodle-row">' +
      NOODLES.map(n =>
        `<button class="mp-noodle-btn" onclick="mpSelectNoodle('${item}','${n}')" id="mpnoodle-${item}-${n}">${n}</button>`
      ).join('') + '</div>';
  }
  if (HAS_SIZE.has(item)) {
    html += '<div class="mp-sub-label">大小</div><div class="mp-size-row">' +
      SIZES.map(s =>
        `<button class="mp-size-btn" onclick="mpSelectSize('${item}','${s}')" id="mpsize-${item}-${s}">${s}</button>`
      ).join('') + '</div>';
  }

  panel.innerHTML = html;
  panel.classList.add('show');
  setTimeout(() => panel.scrollIntoView({ behavior:'smooth', block:'nearest' }), 60);
  updateSummary();
}

// ── 選麵種 ──
function mpSelectNoodle(item, noodle) {
  opState.noodle = noodle;
  document.querySelectorAll(`[id^="mpnoodle-${item}-"]`).forEach(b => b.classList.remove('sel'));
  document.getElementById(`mpnoodle-${item}-${noodle}`).classList.add('sel');
  updateSummary();
}

// ── 選大小 ──
function mpSelectSize(item, size) {
  opState.size = size;
  document.querySelectorAll(`[id^="mpsize-${item}-"]`).forEach(b => b.classList.remove('sel'));
  document.getElementById(`mpsize-${item}-${size}`).classList.add('sel');
  updateSummary();
}

// ── 加料 ──
function mpToggleExtra(e) {
  const idx = opState.extras.indexOf(e);
  if (idx >= 0) opState.extras.splice(idx, 1); else opState.extras.push(e);
  document.getElementById('mpex-' + e).classList.toggle('sel', opState.extras.includes(e));
  updateSummary();
}

// ── 數量 ──
function changeQty(delta) {
  opState.qty = Math.max(1, Math.min(9, opState.qty + delta));
  document.getElementById('opQtyNum').textContent = opState.qty;
  updateSummary();
}

// ── 判斷是否可加入 ──
function isOrderReady() {
  if (!opState.item) return false;
  if (HAS_NOODLE.has(opState.item) && !opState.noodle) return false;
  if (HAS_SIZE.has(opState.item) && !opState.size) return false;
  return true;
}

// ── 組合餐點文字 ──
function buildOrderText() {
  if (!opState.item) return null;
  let parts = [];
  if (opState.size) parts.push(opState.size);
  parts.push(opState.item);
  if (opState.noodle) parts.push(opState.noodle);
  if (opState.extras.length > 0) parts.push(opState.extras.join('、'));
  const base = parts.join(' ');
  return opState.qty > 1 ? base + ' x' + opState.qty : base;
}

function buildWhoText() {
  return opState.dineIn || '手動點餐';
}

// ── 更新摘要列 ──
function updateSummary() {
  const text = buildOrderText();
  const ready = isOrderReady();
  const summary = document.getElementById('opSummary');
  const addBtn  = document.getElementById('opAddCart');
  summary.textContent = text || '← 請先選餐點';
  summary.className = 'mp-summary-text' + (ready ? ' ready' : '');
  addBtn.className  = 'mp-add-btn' + (ready ? '' : ' disabled');
}

// ── 加入清單 ──
function addToCart() {
  if (!isOrderReady()) return;
  cartItems.push(buildOrderText());
  renderCart();
  // 保留 dineIn，清除其他選擇
  const dine = opState.dineIn;
  opState = { item:null, noodle:null, size:null, extras:[], qty:1, dineIn:dine };
  const panel = document.getElementById('mpSharedSubPanel');
  panel.innerHTML = ''; panel.classList.remove('show');
  initManualPanel();
  document.getElementById('opQtyNum').textContent = '1';
  updateSummary();
}

// ── 刪除清單項目 ──
function removeCartItem(idx) {
  cartItems.splice(idx, 1);
  renderCart();
}

// ── 渲染清單 ──
function renderCart() {
  const section   = document.getElementById('opCartSection');
  const list      = document.getElementById('opCartList');
  const submitBtn = document.getElementById('opSubmit');
  if (cartItems.length === 0) {
    section.style.display = 'none';
    submitBtn.className = 'mp-submit disabled';
    return;
  }
  section.style.display = 'block';
  list.innerHTML = cartItems.map((item, i) => `
    <div class="mp-cart-item">
      <div class="mp-cart-item-text">${esc(item)}</div>
      <button class="mp-cart-del" onclick="removeCartItem(${i})">✕</button>
    </div>
  `).join('');
  submitBtn.className = 'mp-submit';
}

// ── 送出開單 ──
function submitManualOrder() {
  if (cartItems.length === 0) return;
  const who  = buildWhoText();
  const what = cartItems.join('　');
  addOrder(who, what);
  resetManualOrder();
}

// ── 全部重置 ──
function resetManualOrder() {
  opState   = { item:null, noodle:null, size:null, extras:[], qty:1, dineIn:null };
  cartItems = [];
  document.getElementById('dineIn').className  = 'mp-dine-btn';
  document.getElementById('dineOut').className = 'mp-dine-btn';
  const panel = document.getElementById('mpSharedSubPanel');
  panel.innerHTML = ''; panel.classList.remove('show');
  initManualPanel();
  document.getElementById('opQtyNum').textContent = '1';
  document.getElementById('opCartSection').style.display = 'none';
  document.getElementById('opSubmit').className = 'mp-submit disabled';
  updateSummary();
}

// ────────────────────────────────────────────
// 螢幕常亮（Wake Lock）
// ────────────────────────────────────────────
let wakeLock = null;

async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
      updateWakeLockUI(true);
      wakeLock.addEventListener('release', () => {
        updateWakeLockUI(false);
      });
    }
  } catch(e) {
    updateWakeLockUI(false);
  }
}

function updateWakeLockUI(active) {
  const el = document.getElementById('wakeLockIndicator');
  if (!el) return;
  el.textContent = active ? '🔆 螢幕常亮' : '🔅 螢幕可能熄滅';
  el.style.color = active ? 'var(--green)' : 'var(--text-dim)';
}

// 頁面重新顯示時（從背景切回來）自動重新申請
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') requestWakeLock();
});

// ── Init ──
loadOrders();
renderCards();
updateMicUI();
requestWakeLock();
initManualPanel();
</script>
